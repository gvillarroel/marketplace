name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run prek quality gate
        run: npm run quality

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
        # This workflow does not provision supported Copilot, OpenCode, or Pi
        # versions; ignore ambient runner binaries and keep those probes local.
        env:
          AGENT_HARBOR_SKIP_NATIVE_CLI_TESTS: "1"
